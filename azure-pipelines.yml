# ASP.NET Core (.NET Framework)
# Build and test ASP.NET Core projects targeting the full .NET Framework.
# Add steps that publish symbols, save build artifacts, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/dotnet-core

trigger:
- master

pool:
  name: 'vm-agent-pool'

variables:
  buildConfiguration: 'Release'
  deployPath: 'C:\inetpub\MyMvcApp-Test'

stages:

# 🔵 DEV STAGE
- stage: Dev
  displayName: 'Deploy to Dev'
  variables:
  - group: dev-config
  jobs:
  - deployment: DeployDev   # 👈 changed from job → deployment
    environment: dev        # 👈 auto (no approval configured)
    strategy:
      runOnce:
        deploy:
          steps:

          # ✅ Install .NET SDK
          - task: UseDotNet@2
            inputs:
              packageType: 'sdk'
              version: '9.0.x'

          # ✅ Verify .NET
          - script: dotnet --version
            displayName: 'Check .NET Version'

          # ✅ Clean old build (IMPORTANT)
          - script: dotnet clean
            displayName: 'Clean Solution'

          # ✅ Restore
          - script: dotnet restore
            displayName: 'Restore'

          # ✅ Build
          - script: dotnet build --configuration $(buildConfiguration)
            displayName: 'Build'

          # ✅ Publish
          - script: dotnet publish -c $(buildConfiguration) -o $(Build.ArtifactStagingDirectory)
            displayName: 'Publish'

          # 🌍 Set Environment Variables (IMPORTANT - THIS WAS MISSING)
          - powershell: |
              Write-Host "Setting environment variables..."
              [System.Environment]::SetEnvironmentVariable("ASPNETCORE_ENVIRONMENT", "Development", "Machine")
              [System.Environment]::SetEnvironmentVariable("API_URL", "$(API_URL)", "Machine")
              [System.Environment]::SetEnvironmentVariable("DB_CONN", "$(DB_CONN)", "Machine")
            displayName: 'Set Environment Variables'

          # 🔴 STOP IIS (releases DLL lock)
          - script: |
              echo Stopping IIS...
              iisreset /stop
            displayName: 'Stop IIS'

          # 🧹 Delete old files (VERY IMPORTANT - ensures clean deployment)
          - powershell: |
              Write-Host "Cleaning deployment folder..."
              if (Test-Path "$(deployPath)") {
                  Remove-Item "$(deployPath)\*" -Recurse -Force -ErrorAction SilentlyContinue
              }
            displayName: 'Clean Deployment Folder'

          # 📁 Copy new files
          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.ArtifactStagingDirectory)'
              Contents: '**'
              TargetFolder: '$(deployPath)'
              OverWrite: true

          # 🟢 START IIS
          - script: |
              echo Starting IIS...
              iisreset /start
            displayName: 'Start IIS'


# 🟡 QA STAGE
- stage: QA
  displayName: 'Deploy to QA'
  dependsOn: Dev
  variables:
  - group: qa-config
  jobs:
  - deployment: DeployQA   # 👈 changed
    environment: qa        # 👈 manual approval here
    strategy:
      runOnce:
        deploy:
          steps:

          # 🔁 Reuse same deployment logic (optional but recommended)
          - script: echo "QA Deployment using variables from qa-config"
            displayName: 'QA Stage Trigger'


# 🔴 PROD STAGE
- stage: Prod
  displayName: 'Deploy to PROD'
  dependsOn: QA
  variables:
  - group: prod-config
  jobs:
  - deployment: DeployProd   # 👈 changed
    environment: prod        # 👈 manual approval here
    strategy:
      runOnce:
        deploy:
          steps:

          # 🔁 Reuse same deployment logic (optional but recommended)
          - script: echo "PROD Deployment using variables from prod-config"
            displayName: 'PROD Stage Trigger'
